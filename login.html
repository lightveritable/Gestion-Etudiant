<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="Auth.js"></script>
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2563eb, #1e3a8a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.box {
  width: 320px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  color: white;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h2 {
  margin-bottom: 20px;
}

/* INPUTS */
input {
  width: 92%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin: auto;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
  transform: scale(1.03);
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

/* MESSAGE */
#message {
  margin-top: 10px;
  font-size: 14px;
}

/* LOADER */
.loader {
  border: 3px solid rgba(255,255,255,0.3);
  border-top: 3px solid white;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  animation: spin 1s linear infinite;
  display: none;
  margin: 10px auto;
}

@keyframes spin {
  0% {transform: rotate(0deg);}
  100% {transform: rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Connexion</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn" onclick="login()">Se connecter</button>

  <div class="loader" id="loader"></div>

  <p id="message"></p>
</div>

<script>

const LOGIN_WEBHOOK = "https://hook.us2.make.com/mpe4vm531rlkeltrmi70ksa1vi6wfnpq";

// ENTER key support
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

async function login() {
  const btn = document.getElementById("loginBtn");
  const loader = document.getElementById("loader");
  const msg = document.getElementById("message");

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    msg.style.color = "yellow";
    msg.innerText = "⚠️ Remplis tous les champs";
    return;
  }

  btn.disabled = true;
  loader.style.display = "block";
  msg.innerText = "";

  try {
    const res = await fetch(LOGIN_WEBHOOK, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {

      const expireTime = new Date().getTime() + 60 * 60 * 1000;

      sessionStorage.setItem("token", data.token);
      sessionStorage.setItem("expireTime", expireTime);

      msg.style.color = "#22c55e";
      msg.innerText = "✅ Connexion réussie";

      setTimeout(() => {
        window.location.href = "list.html";
      }, 800);

    } else {
      throw new Error();
    }

  } catch (e) {
    msg.style.color = "#ef4444";
    msg.innerText = "❌ Login incorrect";
  }

  btn.disabled = false;
  loader.style.display = "none";
}

</script>

</body>
</html>
