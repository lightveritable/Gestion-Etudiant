<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Factures</title>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex flex-col font-sans text-gray-800">

  <!-- Global Top Navigation Header -->
  <header class="sticky top-0 z-50 w-full h-[70px] bg-[#1e3a8a] shadow-md flex items-center justify-between px-6 shrink-0">
    <!-- Left Section -->
    <div class="flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      <span class="text-white font-bold text-[18px]">Gestion Étudiants</span>
    </div>

    <!-- Right Section -->
    <nav class="flex items-center gap-4">
      <button onclick="btnAjout()" class="px-4 py-2 rounded-lg bg-transparent hover:bg-white/10 text-white flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6zM16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z" />
        </svg>
        Ajouter Étudiant
      </button>
      <a href="list.html" class="px-4 py-2 rounded-lg bg-transparent hover:bg-white/10 text-white flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
        </svg>
        Liste des Étudiants
      </a>
      <a href="list-facture.html" class="px-4 py-2 rounded-lg bg-[#2563eb] text-white font-semibold flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Factures
      </a>
    </nav>
  </header>

  <main class="flex-grow flex justify-center p-4">
    <div class="w-full max-w-[95%] xl:max-w-[1400px] mt-[30px] bg-white rounded-[16px] shadow-lg overflow-hidden flex flex-col self-start">
      
      <!-- Top Card Header -->
      <div class="bg-gradient-to-r from-[#2563eb] to-[#1d4ed8] px-6 py-6 text-white flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold m-0 text-white">Archives des Factures</h1>
          <p class="text-sm mt-1 mb-0 text-blue-100 opacity-90">
            Historique complet des règlements étudiants &mdash;
            <span id="facturesCount" class="font-semibold">0 facture(s)</span>
          </p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white opacity-80"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
      </div>

      <!-- ===== FILTER BAR ===== -->
      <div class="px-6 py-4 bg-[#f8fafc] border-b border-[#e2e8f0] flex flex-wrap items-end gap-4">

        <!-- LEFT — Text search: Référence / Nom / Prénom / Niveau -->
        <div class="flex flex-col gap-1 flex-1 min-w-[220px]">
          <label for="filterTexte" class="text-[11px] font-bold uppercase tracking-wider text-gray-500 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
            Recherche — Référence · Nom · Prénom · Niveau
          </label>
          <div class="relative">
            <input
              type="text"
              id="filterTexte"
              placeholder="Ex : FACT-001, Jean, Dupont, L1…"
              oninput="filtrerFactures()"
              class="w-full pl-4 pr-10 py-2.5 rounded-xl border border-gray-300 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 shadow-sm transition-all"
            >
            <button id="clearTexte" onclick="clearFilter('filterTexte')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden transition-colors" title="Effacer">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
            </button>
          </div>
        </div>

        <!-- RIGHT — Numeric search: N° Paiement -->
        <div class="flex flex-col gap-1 w-[200px] shrink-0">
          <label for="filterNumero" class="text-[11px] font-bold uppercase tracking-wider text-gray-500 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
            N° Paiement
          </label>
          <div class="relative">
            <input
              type="text"
              id="filterNumero"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Ex : 3"
              oninput="onNumeroInput(this); filtrerFactures()"
              class="w-full pl-4 pr-10 py-2.5 rounded-xl border border-gray-300 bg-white text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 shadow-sm transition-all"
            >
            <button id="clearNumero" onclick="clearFilter('filterNumero')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden transition-colors" title="Effacer">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
            </button>
          </div>
        </div>

        <!-- Stats résultats -->
        <div class="flex items-end pb-0.5 shrink-0">
          <span id="filterResult" class="text-[12px] text-gray-400 font-medium whitespace-nowrap"></span>
        </div>

      </div>
      <!-- ===== END FILTER BAR ===== -->

      <!-- Content -->
      <div class="overflow-x-auto w-full">
        <table class="w-full text-left border-collapse min-w-[1000px]">
          <thead class="bg-[#f1f5f9] text-[#334155] border-b border-[#e2e8f0]">
            <tr>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Référence</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Date Paiement</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Matricule</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Nom</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Prénom</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0] text-center">Niveau</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Raison</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Mode Paiement</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">N° Paiement</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Paiement</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Montant Payé</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Total (Ar)</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Reste (Ar)</th>
              <th class="p-[14px] font-semibold text-sm border-b border-[#e2e8f0]">Actions</th>
            </tr>
          </thead>
          <tbody id="facturesTable">
            <!-- Table content populated by facture.js -->
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="script.js"></script>
  <script src="facture.js"></script>
</body>
</html>
